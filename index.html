<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Bird</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to bottom, #70c5ce, #ffffff);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      border: 4px solid #222;
      background: #70c5ce;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// =======================
// GAME SETTINGS
// =======================

let score = 0;
let highScore = localStorage.getItem("highScore") || 0;

let gameStarted = false;
let gameOver = false;

const gravity = 0.5;
const jumpForce = -9;

// =======================
// BIRD
// =======================

const bird = {
  x: 80,
  y: 300,
  radius: 18,
  velocity: 0,

  draw() {
    // body
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // eye
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(this.x + 6, this.y - 5, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(this.x + 7, this.y - 5, 2, 0, Math.PI * 2);
    ctx.fill();

    // beak
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.moveTo(this.x + 14, this.y);
    ctx.lineTo(this.x + 24, this.y + 5);
    ctx.lineTo(this.x + 14, this.y + 10);
    ctx.fill();
  },

  update() {
    this.velocity += gravity;
    this.y += this.velocity;

    // Floor collision
    if (this.y + this.radius >= canvas.height) {
      this.y = canvas.height - this.radius;
      endGame();
    }

    // Ceiling collision
    if (this.y - this.radius <= 0) {
      this.y = this.radius;
      this.velocity = 0;
    }
  },

  flap() {
    this.velocity = jumpForce;
  },

  reset() {
    this.y = 300;
    this.velocity = 0;
  }
};

// =======================
// PIPES
// =======================

const pipes = [];

const pipeWidth = 70;
const pipeGap = 170;
const pipeSpeed = 3;

function createPipe() {
  const topHeight = Math.random() * 250 + 50;

  pipes.push({
    x: canvas.width,
    top: topHeight,
    bottom: canvas.height - topHeight - pipeGap,
    passed: false
  });
}

function updatePipes() {
  pipes.forEach(pipe => {
    pipe.x -= pipeSpeed;

    // Score
    if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
      pipe.passed = true;
      score++;

      if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
      }
    }

    // Collision
    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + pipeWidth &&
      (
        bird.y - bird.radius < pipe.top ||
        bird.y + bird.radius > canvas.height - pipe.bottom
      )
    ) {
      endGame();
    }
  });

  // Remove old pipes
  if (pipes.length > 0 && pipes[0].x + pipeWidth < 0) {
    pipes.shift();
  }
}

function drawPipes() {
  pipes.forEach(pipe => {

    // Pipe color
    ctx.fillStyle = "#2ecc71";

    // Top pipe
    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);

    // Bottom pipe
    ctx.fillRect(
      pipe.x,
      canvas.height - pipe.bottom,
      pipeWidth,
      pipe.bottom
    );

    // Pipe caps
    ctx.fillStyle = "#27ae60";

    ctx.fillRect(pipe.x - 5, pipe.top - 20, pipeWidth + 10, 20);

    ctx.fillRect(
      pipe.x - 5,
      canvas.height - pipe.bottom,
      pipeWidth + 10,
      20
    );
  });
}

// =======================
// BACKGROUND
// =======================

function drawBackground() {
  // Sky
  ctx.fillStyle = "#70c5ce";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Clouds
  ctx.fillStyle = "rgba(255,255,255,0.8)";

  ctx.beginPath();
  ctx.arc(100, 100, 25, 0, Math.PI * 2);
  ctx.arc(130, 100, 30, 0, Math.PI * 2);
  ctx.arc(160, 100, 25, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(280, 180, 20, 0, Math.PI * 2);
  ctx.arc(305, 180, 25, 0, Math.PI * 2);
  ctx.arc(330, 180, 20, 0, Math.PI * 2);
  ctx.fill();
}

// =======================
// UI
// =======================

function drawText() {
  ctx.fillStyle = "white";
  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;

  // Score
  ctx.font = "40px Arial";
  ctx.strokeText(score, canvas.width / 2 - 10, 60);
  ctx.fillText(score, canvas.width / 2 - 10, 60);

  // High score
  ctx.font = "20px Arial";
  ctx.strokeText("High Score: " + highScore, 10, 30);
  ctx.fillText("High Score: " + highScore, 10, 30);

  // Start screen
  if (!gameStarted) {
    ctx.font = "28px Arial";

    ctx.strokeText("Press SPACE", 110, 250);
    ctx.fillText("Press SPACE", 110, 250);

    ctx.strokeText("to Start", 130, 300);
    ctx.fillText("to Start", 130, 300);
  }

  // Game over screen
  if (gameOver) {
    ctx.font = "42px Arial";

    ctx.strokeText("GAME OVER", 70, 250);
    ctx.fillText("GAME OVER", 70, 250);

    ctx.font = "24px Arial";

    ctx.strokeText("Press R to Restart", 85, 320);
    ctx.fillText("Press R to Restart", 85, 320);
  }
}

// =======================
// GAME CONTROL
// =======================

function startGame() {
  if (!gameStarted) {
    gameStarted = true;
  }
}

function endGame() {
  gameOver = true;
}

function resetGame() {
  score = 0;
  gameOver = false;
  gameStarted = true;

  pipes.length = 0;
  bird.reset();
}

// =======================
// GAME LOOP
// =======================

function update() {
  if (!gameStarted || gameOver) return;

  bird.update();
  updatePipes();
}

function draw() {
  drawBackground();
  drawPipes();
  bird.draw();
  drawText();
}

function gameLoop() {
  update();
  draw();

  requestAnimationFrame(gameLoop);
}

// =======================
// PIPE SPAWNER
// =======================

setInterval(() => {
  if (gameStarted && !gameOver) {
    createPipe();
  }
}, 1500);

// =======================
// CONTROLS
// =======================

function handleInput() {

  if (!gameStarted) {
    startGame();
  }

  if (!gameOver) {
    bird.flap();
  }
}

document.addEventListener("keydown", (e) => {

  if (e.code === "Space") {
    e.preventDefault();
    handleInput();
  }

  if (e.code === "KeyR" && gameOver) {
    resetGame();
  }
});

document.addEventListener("mousedown", () => {
  handleInput();
});

// Mobile support
document.addEventListener("touchstart", () => {
  handleInput();
});

// =======================
// START GAME
// =======================

gameLoop();

</script>

</body>
</html>
